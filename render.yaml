services:
  - type: web
    name: entrance-exam-coach
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: entrance-exam-coach-db
          property: connectionString

databases:
  - name: entrance-exam-coach-db
    plan: free
